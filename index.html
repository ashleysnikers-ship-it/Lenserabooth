<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LENSERA Foto Booth</title>
  
  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    :root {
      --bg: #1A1018;
      --text: #F5F5F5;
      --accent: #D4899A;
      --accent-hover: #E5A0AB;
      --glass: rgba(255, 255, 255, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    /* Screen Management */
    .screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: absolute; top: 0; left: 0; transition: opacity 0.4s ease; z-index: 1; }
    .screen.active { display: flex; z-index: 10; }

    /* UI Components */
    .btn { background: var(--accent); color: white; border: none; padding: 12px 24px; font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin: 10px; transition: 0.2s; }
    .btn:hover { background: var(--accent-hover); transform: scale(1.05); }
    .btn-sec { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    
    /* Camera View */
    #cam-container { position: relative; width: 100%; max-width: 500px; aspect-ratio: 3/4; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: var(--filter-css); }
    #flash-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; transition: opacity 0.1s; z-index: 20; }
    
    /* Gallery */
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; width: 100%; max-width: 500px; }
    .gallery-item { aspect-ratio: 3/4; background: #000; border-radius: 8px; overflow: hidden; border: 2px solid var(--accent); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

    /* Admin */
    .admin-panel { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 100; padding: 40px; }
    .admin-panel.open { display: block; }
    .stat-box { background: var(--glass); padding: 15px; border-radius: 8px; margin-bottom: 10px; text-align: left; }

    /* Loading / QR */
    .spinner { border: 4px solid var(--glass); border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <h1 style="font-size: 3rem; color: var(--accent); margin-bottom: 20px;">LENSERA</h1>
    <p style="margin-bottom: 40px; opacity: 0.8;">Korean Minimal Photobooth</p>
    <button class="btn" onclick="selectPackage()">MULAI FOTO</button>
    <small style="margin-top: 50px; opacity: 0.3; cursor: pointer;" onclick="openAdmin()">⚙ Admin</small>
  </div>

  <!-- PACKAGES -->
  <div id="screen-packages" class="screen">
    <h2 style="margin-bottom: 20px;">Pilih Paket</h2>
    <div id="package-list" style="width: 100%; max-width: 400px;"></div>
    <button class="btn btn-sec" onclick="goTo('home')">Kembali</button>
  </div>

  <!-- CAMERA -->
  <div id="screen-camera" class="screen">
    <h3 id="cam-title" style="margin-bottom: 10px;">Bestie Package</h3>
    <div id="cam-container">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="canvas-capture" style="display:none;"></canvas>
      <div id="flash-overlay"></div>
